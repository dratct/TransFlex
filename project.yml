name: TransFlex

options:
  bundleIdPrefix: io.aiaz.transflex
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.10.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.4.0

targets:
  TransFlex:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: TransFlex/Sources
    info:
      path: TransFlex/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "$(TRANSFLEX_DISPLAY_NAME)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 TransFlex Contributors."
        LSMinimumSystemVersion: "13.0"
        TransFlexApplicationSupportDirectoryName: "$(TRANSFLEX_APP_SUPPORT_DIR)"
        TransFlexKeychainService: "$(TRANSFLEX_KEYCHAIN_SERVICE)"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSPrincipalClass: NSApplication
    entitlements:
      path: TransFlex/TransFlex.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_MODULE_NAME: TransFlex
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: io.aiaz.transflex.dev
          PRODUCT_NAME: TransFlexDev
          TRANSFLEX_DISPLAY_NAME: TransFlex Dev
          TRANSFLEX_APP_SUPPORT_DIR: TransFlexDev
          TRANSFLEX_KEYCHAIN_SERVICE: io.aiaz.transflex.dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: io.aiaz.transflex
          PRODUCT_NAME: TransFlex
          TRANSFLEX_DISPLAY_NAME: TransFlex
          TRANSFLEX_APP_SUPPORT_DIR: TransFlex
          TRANSFLEX_KEYCHAIN_SERVICE: io.aiaz.transflex
    dependencies:
      - package: GRDB
        product: GRDB
      - package: KeyboardShortcuts
        product: KeyboardShortcuts

  TransFlexTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: TransFlexTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.aiaz.transflex.tests
        PRODUCT_NAME: TransFlexTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
      configs:
        Debug:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TransFlexDev.app/Contents/MacOS/TransFlexDev"
        Release:
          TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TransFlex.app/Contents/MacOS/TransFlex"
    dependencies:
      - target: TransFlex

schemes:
  TransFlex:
    build:
      targets:
        TransFlex: all
        TransFlexTests: [test]
    test:
      targets:
        - TransFlexTests
      gatherCoverageData: true
