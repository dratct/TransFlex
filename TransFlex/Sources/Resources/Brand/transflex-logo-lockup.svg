  <text x="215" y="141" fill="#8ea3bb" font-family="Inter, SF Pro Text, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="560" letter-spacing="0">AI translation, anywhere on macOS</text>
