name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without leading v, such as 0.2.0 or 0.2.0-alpha.1
        required: true
        type: string
      draft:
        description: Create the GitHub Release as a draft
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub Release as a prerelease
        default: true
        type: boolean
      signed:
        description: Build, notarize, and publish a signed Developer ID artifact
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build Release Artifact
    runs-on: macos-26
    timeout-minutes: 60

    env:
      APP_PATH: DerivedData/Build/Products/Release/TransFlex.app
      SIGNED_REQUESTED: ${{ github.event_name == 'workflow_dispatch' && inputs.signed || 'false' }}
      DRAFT_RELEASE: ${{ github.event_name != 'workflow_dispatch' && 'false' || inputs.draft }}
      PRERELEASE_RELEASE: ${{ github.event_name != 'workflow_dispatch' && (contains(github.ref_name, '-') && 'true' || 'false') || inputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version
          uname -m

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: scripts/resolve-release-version.sh

      - name: Verify manual release tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Check out release tag
        run: git checkout --force "${{ steps.version.outputs.tag }}"

      - name: Require signing secrets
        if: env.SIGNED_REQUESTED == 'true'
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: |
          missing=()
          for name in \
            APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 \
            APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_ISSUER_ID \
            APPLE_NOTARY_KEY_BASE64
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'error: signed release requested but missing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: make test

      - name: Import Developer ID certificate
        if: env.SIGNED_REQUESTED == 'true'
        id: signing
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/transflex-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          umask 077
          printf '%s' "$APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          chmod 600 "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          identity="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$identity" ]]; then
            echo "error: no Developer ID Application identity found in imported keychain." >&2
            exit 1
          fi

          echo "developer_id_application=$identity" >> "$GITHUB_OUTPUT"

      - name: Build unsigned Release app
        if: env.SIGNED_REQUESTED != 'true'
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ steps.version.outputs.build_number }}
        run: scripts/build.sh --release --no-gen

      - name: Build signed Release app
        if: env.SIGNED_REQUESTED == 'true'
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ steps.version.outputs.build_number }}
          TRANSFLEX_SIGNING_MODE: developer-id
          DEVELOPER_ID_APPLICATION: ${{ steps.signing.outputs.developer_id_application }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: scripts/build.sh --release --no-gen

      - name: Verify built app
        run: |
          scripts/verify-release-app.sh \
            --app "$APP_PATH" \
            --expected-min-macos 13.0 \
            --expected-marketing-version "${{ steps.version.outputs.version }}" \
            --expected-build-version "${{ steps.version.outputs.build_number }}"

      - name: Verify code signature
        if: env.SIGNED_REQUESTED == 'true'
        run: codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize and staple
        if: env.SIGNED_REQUESTED == 'true'
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: |
          NOTARY_ZIP="$RUNNER_TEMP/TransFlex-notary.zip"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"

          umask 077
          printf '%s' "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"

      - name: Package release artifact
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SIGNING_LABEL: ${{ env.SIGNED_REQUESTED == 'true' && 'signed-notarized' || 'unsigned' }}
        run: scripts/package-release.sh "$APP_PATH"

      - name: Create release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GENERATED_NOTES="$RUNNER_TEMP/generated-release-notes.md"
          RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"

          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${{ steps.version.outputs.tag }}" \
            --jq .body > "$GENERATED_NOTES"

          {
            echo "## Compatibility"
            echo
            echo "- Requires macOS 13 Ventura or later."
            echo "- Universal app for Intel and Apple Silicon."
            if [[ "$SIGNED_REQUESTED" == "true" ]]; then
              echo "- Signed with Developer ID and notarized by Apple."
            else
              echo "- This alpha artifact is unsigned and not notarized."
            fi
            echo
            cat "$GENERATED_NOTES"
          } > "$RELEASE_NOTES"

          echo "release_notes=$RELEASE_NOTES" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: TransFlex-${{ steps.version.outputs.version }}-release-assets
          path: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_NOTES: ${{ steps.notes.outputs.release_notes }}
          ARTIFACT: ${{ steps.package.outputs.artifact }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: scripts/publish-release.sh

      - name: Clean signing material
        if: always()
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        run: |
          security delete-keychain "$RUNNER_TEMP/transflex-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/developer_id_application.p12"
          rm -f "$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          rm -f "$RUNNER_TEMP/TransFlex-notary.zip"
