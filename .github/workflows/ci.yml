name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version
          uname -m

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run release script tests
        run: scripts/test-release-scripts.sh

      - name: Run build script tests
        run: scripts/test-build-script.sh

      - name: Run tests
        run: make test

      - name: Build Release
        run: scripts/build.sh --release --no-gen

      - name: Verify Release app
        run: |
          scripts/verify-release-app.sh \
            --app DerivedData/Build/Products/Release/TransFlex.app \
            --expected-min-macos 13.0

      - name: Upload Release app for diagnostics
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: TransFlex-ci-release-app
          path: DerivedData/Build/Products/Release/TransFlex.app
          if-no-files-found: ignore
          retention-days: 7

  intel-tests:
    name: Intel Test Probe
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-26-intel
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version
          uname -m

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: make test
